name: Scheduled Catalog Update & Deploy

on:
  schedule:
    # Jeden Tag um 02:00 UTC (04:00 Uhr deutscher Sommerzeit)
    - cron: '0 2 * * *'
  workflow_dispatch: # Ermöglicht manuelles Starten über GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    name: Run Update Pipeline & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pytest requests
          fi

      - name: Run pipeline - Classify and Score
        run: |
          # Führe Klassifizierung und das neue 100-Punkte-Scoring aus
          python scripts/classify.py --input data/catalog.json --taxonomy data/taxonomy.json --output data/catalog.json
          python scripts/score.py --input data/catalog.json --output data/catalog.json
          
          # Generiere Hilfsdateien
          python scripts/snapshot.py --input data/catalog.json
          python scripts/build_search_index.py --input data/catalog.json --output data/search-index.json
          
          # Erstelle Markdown Renderings falls vorhanden
          if [ -f scripts/render.py ]; then
            python scripts/render.py
          fi

      - name: Run verification tests
        run: |
          python -m pytest tests/ -v

      - name: Commit updated catalog and data files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/search-index.json data/history/ README.md
          # Nur committen und pushen, wenn sich Daten verändert haben
          if git diff --staged --quiet; then
            echo "No changes detected in catalog data."
          else
            git commit -m "chore(data): auto-update catalog scores and search index"
            git push origin main
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: |
          cd web
          npm ci

      - name: Build Astro site
        run: |
          cd web
          npm run build

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: update-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
